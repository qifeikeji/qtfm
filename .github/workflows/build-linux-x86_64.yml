# CI: Linux x86_64 (ubuntu-22.04) + AppImage artifact
name: Build Linux x86_64

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  QTFM_VERSION: "6.3.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify runner is x86_64
        run: |
          arch="$(uname -m)"
          echo "Runner architecture: ${arch}"
          test "${arch}" = "x86_64"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            qtbase5-dev \
            qt5-qmake \
            libmagick++-dev \
            libavdevice-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libfuse2 \
            file \
            wget

      - name: Build (qmake release)
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=with_magick CONFIG+=with_ffmpeg CONFIG+=release PREFIX=/usr ..
          make -j"$(nproc)"

      - name: Verify binary
        run: |
          file build/bin/qtfm
          file build/bin/qtfm | grep -E 'x86-64|Intel 80386'
          test -x build/bin/qtfm

      - name: Download linuxdeploy
        run: |
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage

      - name: Install into AppDir
        working-directory: build
        run: make INSTALL_ROOT="${GITHUB_WORKSPACE}/AppDir" install

      - name: Build AppImage
        env:
          LINUXDEPLOY_OUTPUT_VERSION: ${{ env.QTFM_VERSION }}
          ARCH: x86_64
          QMAKE: qmake
        run: |
          APPDIR="${GITHUB_WORKSPACE}/AppDir"
          test -x "${APPDIR}/usr/bin/qtfm"
          test -f "${APPDIR}/usr/share/applications/qtfm.desktop"

          EXTRA_LIBS=()
          while IFS= read -r lib; do
            if [ -n "${lib}" ] && [ -f "${lib}" ]; then
              EXTRA_LIBS+=(--library "${lib}")
            fi
          done < <(
            ldd "${APPDIR}/usr/bin/qtfm" | awk '/=>/ {print $3}' \
              | grep -E 'lib(Magick|MagickCore|MagickWand|avcodec|avformat|avutil|avdevice|swscale|swresample)' \
              || true
          )

          ./linuxdeploy.AppImage --appdir="${APPDIR}" \
            --executable="${APPDIR}/usr/bin/qtfm" \
            --desktop-file="${APPDIR}/usr/share/applications/qtfm.desktop" \
            --icon-file="${APPDIR}/usr/share/icons/hicolor/scalable/apps/qtfm.svg" \
            --plugin qt \
            "${EXTRA_LIBS[@]}" \
            --output appimage

          shopt -s nullglob
          if [ -f "QtFM-${QTFM_VERSION}-x86_64.AppImage" ]; then
            mv "QtFM-${QTFM_VERSION}-x86_64.AppImage" "qtfm-${QTFM_VERSION}-x86_64.AppImage"
          elif [ -f "qtfm-${QTFM_VERSION}-x86_64.AppImage" ]; then
            true
          else
            echo "No AppImage produced. Contents:"
            ls -la
            find "${GITHUB_WORKSPACE}" -maxdepth 3 -name '*.AppImage' -print
            exit 1
          fi
          ls -lah "qtfm-${QTFM_VERSION}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: qtfm-${{ env.QTFM_VERSION }}-linux-x86_64
          path: qtfm-${{ env.QTFM_VERSION }}-x86_64.AppImage
          if-no-files-found: error
