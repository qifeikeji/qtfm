# CI: Linux x86_64 (ubuntu-22.04) + AppImage artifact
name: Build Linux x86_64

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  QTFM_VERSION: "6.3.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify runner is x86_64
        run: |
          arch="$(uname -m)"
          echo "Runner architecture: ${arch}"
          test "${arch}" = "x86_64"

      - name: Guard Qt Svg scope (libfm vs qtfm app)
        run: |
          if grep -E '^QT\s*\+=' share/qtfm.pri | grep -q svg; then
            echo "Qt Svg must not be in share/qtfm.pri (libfm); use fm/fm.pro only."
            exit 1
          fi
          grep -qE 'QT.*svg' fm/fm.pro || { echo "fm/fm.pro must request Qt Svg"; exit 1; }

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            qtbase5-dev \
            qt5-qmake \
            libqt5svg5-dev \
            libmagick++-dev \
            ffmpeg \
            poppler-utils \
            libfuse2 \
            file \
            wget

      - name: Regenerate mimes.qrc
        run: ./share/icons/mimes/update_qrc.sh

      - name: Build (qmake release)
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=with_magick CONFIG+=release PREFIX=/usr ..
          LOG=build.log
          : > "$LOG"

          run_make() {
            local target="$1"
            echo ""
            echo "========== make ${target} =========="
            set -o pipefail
            make "${target}" -j"$(nproc)" 2>&1 | tee -a "$LOG"
            return "${PIPESTATUS[0]}"
          }

          run_make sub-libfm-make_first || exit 1

          if ! run_make sub-fm-make_first; then
            echo ""
            echo "::group::fm — compiler / linker errors"
            grep -E ':( error:|fatal error:|undefined reference)' "$LOG" | tail -50 || true
            echo "::endgroup::"
            echo "::group::fm — last 30 lines mentioning mainwindow / fm"
            grep -E 'mainwindow|/fm/' "$LOG" | tail -30 || true
            echo "::endgroup::"
            exit 1
          fi

          run_make sub-tray-make_first || exit 1

          test -x bin/qtfm || { echo "bin/qtfm missing after build"; exit 1; }
          echo "Built: bin/qtfm bin/qtfm-tray"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-linux
          path: build/build.log
          if-no-files-found: ignore

      - name: Verify binary
        run: |
          file build/bin/qtfm
          file build/bin/qtfm | grep -E 'x86-64|Intel 80386'
          test -x build/bin/qtfm

      - name: Download linuxdeploy
        run: |
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage appimagetool.AppImage

      - name: Install into AppDir
        working-directory: build
        run: make INSTALL_ROOT="${GITHUB_WORKSPACE}/AppDir" install

      - name: Verify bundled mime icons in AppDir
        run: |
          test -f "${GITHUB_WORKSPACE}/AppDir/usr/share/qtfm/mimes/folder.svg"
          test -f "${GITHUB_WORKSPACE}/AppDir/usr/share/qtfm/mimes/mp4.svg"
          test -x "${GITHUB_WORKSPACE}/AppDir/usr/bin/qtfm"

      - name: Build AppImage
        env:
          LINUXDEPLOY_OUTPUT_VERSION: ${{ env.QTFM_VERSION }}
          ARCH: x86_64
          QMAKE: qmake
        run: |
          APPDIR="${GITHUB_WORKSPACE}/AppDir"
          test -x "${APPDIR}/usr/bin/qtfm"
          test -f "${APPDIR}/usr/share/applications/qtfm.desktop"

          EXTRA_LIBS=()
          while IFS= read -r lib; do
            if [ -n "${lib}" ] && [ -f "${lib}" ]; then
              EXTRA_LIBS+=(--library "${lib}")
            fi
          done < <(
            ldd "${APPDIR}/usr/bin/qtfm" | awk '/=>/ {print $3}' \
              | grep -E 'lib(Magick|MagickCore|MagickWand|avcodec|avformat|avutil|avdevice|swscale|swresample)' \
              || true
          )

          ICON_PNG="${GITHUB_WORKSPACE}/share/images/app.png"
          ICON_ARG="${APPDIR}/usr/share/icons/hicolor/scalable/apps/qtfm.svg"
          if [ -f "$ICON_PNG" ]; then
            ICON_ARG="$ICON_PNG"
          fi

          ./linuxdeploy.AppImage --appdir="${APPDIR}" \
            --executable="${APPDIR}/usr/bin/qtfm" \
            --desktop-file="${APPDIR}/usr/share/applications/qtfm.desktop" \
            --icon-file="${ICON_ARG}" \
            --plugin qt \
            "${EXTRA_LIBS[@]}"

          # gzip squashfs: works with older squashfuse on Arch/Manjaro (zstd needs newer tools)
          ARCH=x86_64 ./appimagetool.AppImage --comp gzip --no-appstream \
            "${APPDIR}" "qtfm-${QTFM_VERSION}-x86_64.AppImage"

          chmod +x "qtfm-${QTFM_VERSION}-x86_64.AppImage"
          ls -lah "qtfm-${QTFM_VERSION}-x86_64.AppImage"

      - name: Verify AppImage (extract, no FUSE)
        env:
          QTFM_VERSION: ${{ env.QTFM_VERSION }}
        run: |
          ./qtfm-${QTFM_VERSION}-x86_64.AppImage --appimage-extract
          test -x squashfs-root/AppRun
          test -x squashfs-root/usr/bin/qtfm
          rm -rf squashfs-root

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: qtfm-${{ env.QTFM_VERSION }}-linux-x86_64
          path: qtfm-${{ env.QTFM_VERSION }}-x86_64.AppImage
          if-no-files-found: error
